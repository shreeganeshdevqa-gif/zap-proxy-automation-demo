name: Cypress + ZAP Security Scan (Controlled)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  zap-cypress:
    runs-on: ubuntu-latest

    env:
      # 🌐 Target URL
      CYPRESS_BASE_URL: "https://opensource-demo.orangehrmlive.com"

      # 🎛️ Enable / Disable Scans
      ENABLE_SPIDER_GithubActions: "true"
      ENABLE_PASSIVE_GithubActions: "false"
      ENABLE_ACTIVE_GithubActions: "false"

      # ⚠️ Fix Node.js deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # -----------------------------------------
      # Checkout repository
      # -----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------
      # Create report directories
      # -----------------------------------------
      - name: Create report directories
        run: |
          mkdir -p security-and-test-reports/zap-spider
          mkdir -p security-and-test-reports/zap-passive
          mkdir -p security-and-test-reports/zap-active

      # =========================================
      # 🕷️ SPIDER SCAN
      # =========================================
      - name: Run ZAP Spider Scan
        if: env.ENABLE_SPIDER_GithubActions == 'true'
        run: |
          echo "Running Spider Scan..."
          docker run --rm \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd \
            -quickurl $CYPRESS_BASE_URL \
            -quickprogress \
            -quickout /zap/wrk/security-and-test-reports/zap-spider/spider-report.html \
            -spider || true

      # =========================================
      # 🟡 PASSIVE SCAN
      # =========================================
      - name: Run ZAP Passive Scan
        if: env.ENABLE_PASSIVE_GithubActions == 'true'
        run: |
          echo "Running Passive Scan..."
          docker run --rm \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd \
            -quickurl $CYPRESS_BASE_URL \
            -quickprogress \
            -quickout /zap/wrk/security-and-test-reports/zap-passive/passive-report.html || true

      # =========================================
      # 🔴 ACTIVE SCAN
      # =========================================
      - name: Run ZAP Active Scan
        if: env.ENABLE_ACTIVE_GithubActions == 'true'
        run: |
          echo "Running Active Scan..."
          docker run --rm \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd \
            -quickurl $CYPRESS_BASE_URL \
            -quickprogress \
            -quickout /zap/wrk/security-and-test-reports/zap-active/active-report.html \
            -quickscan || true

      # -----------------------------------------
      # Debug - Show generated files
      # -----------------------------------------
      - name: Debug - List generated files
        run: |
          echo "===== GENERATED FILES ====="
          ls -R security-and-test-reports || true

      # -----------------------------------------
      # Upload Reports
      # -----------------------------------------
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-reports
          path: security-and-test-reports
          if-no-files-found: warn