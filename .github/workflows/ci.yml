name: Cypress + ZAP Authenticated Security Scan

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  zap-cypress:
    runs-on: ubuntu-latest

    env:
      CYPRESS_BASE_URL: "https://opensource-demo.orangehrmlive.com"

      ENABLE_SPIDER_GithubActions: "true"
      ENABLE_PASSIVE_GithubActions: "false"
      ENABLE_ACTIVE_GithubActions: "false"

      ZAP_USERNAME: "Admin"
      ZAP_PASSWORD: "admin123"

    steps:
      # -----------------------------------------
      # Checkout
      # -----------------------------------------
      - uses: actions/checkout@v4

      # -----------------------------------------
      # Create report directories
      # -----------------------------------------
      - name: Create report directories
        run: |
          mkdir -p security-and-test-reports/zap-spider
          mkdir -p security-and-test-reports/zap-active

      # -----------------------------------------
      # Create ZAP Automation Config (AUTH ENABLED)
      # -----------------------------------------
      - name: Create ZAP Auth Config
        run: |
          cat <<EOF > zap-auth.yaml
          env:
            contexts:
              - name: "Auth Context"
                urls:
                  - "${CYPRESS_BASE_URL}"
                authentication:
                  method: form
                  parameters:
                    loginUrl: "${CYPRESS_BASE_URL}/web/index.php/auth/login"
                    loginRequestData: "username={%username%}&password={%password%}"
                users:
                  - name: "test-user"
                    credentials:
                      username: "${ZAP_USERNAME}"
                      password: "${ZAP_PASSWORD}"

          jobs:
            - type: spider
              parameters:
                context: "Auth Context"
                user: "test-user"
                maxDuration: 3

            - type: activeScan
              parameters:
                context: "Auth Context"
                user: "test-user"
                maxScanDurationInMins: 5

            - type: report
              parameters:
                template: traditional-html
                reportDir: /zap/wrk/security-and-test-reports/zap-active
                reportFile: authenticated-active-report.html
          EOF

      # -----------------------------------------
      # Run ZAP Authenticated Scan
      # -----------------------------------------
      - name: Run Authenticated ZAP Scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap-auth.yaml || true

      # -----------------------------------------
      # Upload Reports
      # -----------------------------------------
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-authenticated-reports
          path: security-and-test-reports