name: ZAP Security Scans

on:
  push:
    branches: [ main ]
  pull_request:

env:
  # Target URL – override via repository secret or variable
  CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL || 'https://opensource-demo.orangehrmlive.com/web/index.php/auth/login' }}

  # Scan toggles (defaults: Spider=true, Passive=false, Active=false)
  ENABLE_SPIDER_GithubActions: ${{ vars.ENABLE_SPIDER_GithubActions || 'true' }}
  ENABLE_PASSIVE_GithubActions: ${{ vars.ENABLE_PASSIVE_GithubActions || 'false' }}
  ENABLE_ACTIVE_GithubActions: ${{ vars.ENABLE_ACTIVE_GithubActions || 'false' }}

  # Fix Node.js deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optional: Check if target is reachable
      - name: Check target reachability
        run: |
          echo "Checking connectivity to $CYPRESS_BASE_URL"
          curl -I -L -s -o /dev/null -w "%{http_code}\n" "$CYPRESS_BASE_URL" || echo "WARNING: Target may be unreachable"

      # ------------------------------------------------------------
      # 0. Create base directories
      # ------------------------------------------------------------
      - name: Create report directories
        run: |
          mkdir -p security-and-test-reports/zap-spider
          mkdir -p security-and-test-reports/zap-passive
          mkdir -p security-and-test-reports/zap-active
          echo "Base directories created"

      # ------------------------------------------------------------
      # 1. SPIDER SCAN (only if enabled)
      # ------------------------------------------------------------
      - name: Spider scan – generate config
        if: env.ENABLE_SPIDER_GithubActions == 'true'
        run: |
          cat <<EOF > zap-spider.yaml
          env:
            contexts:
              - name: "Default Context"
                urls:
                  - "$CYPRESS_BASE_URL"
            parameters:
              progressToStdout: "true"
              failOnError: "false"
              failOnWarning: "false"

          jobs:
            - type: spider
              parameters:
                context: "Default Context"
                url: "$CYPRESS_BASE_URL"
                maxDuration: 3

            - type: report
              parameters:
                template: traditional-html
                reportDir: /zap/wrk/security-and-test-reports/zap-spider
                reportFile: spider-report.html

            - type: report
              parameters:
                template: traditional-xml
                reportDir: /zap/wrk/security-and-test-reports/zap-spider
                reportFile: spider-report.xml
          EOF
          echo "=== Spider config ==="
          cat zap-spider.yaml

      - name: Spider scan – run
        if: env.ENABLE_SPIDER_GithubActions == 'true'
        continue-on-error: true
        run: |
          mkdir -p security-and-test-reports/zap-spider
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap-spider.yaml

      - name: Spider scan – list reports
        if: env.ENABLE_SPIDER_GithubActions == 'true' && always()
        run: |
          echo "Files in security-and-test-reports/zap-spider:"
          ls -la security-and-test-reports/zap-spider/ || echo "No files found"

      # ------------------------------------------------------------
      # 2. PASSIVE SCAN (only if enabled)
      # ------------------------------------------------------------
      - name: Passive scan – generate config
        if: env.ENABLE_PASSIVE_GithubActions == 'true'
        run: |
          cat <<EOF > zap-passive.yaml
          env:
            contexts:
              - name: "Default Context"
                urls:
                  - "$CYPRESS_BASE_URL"
            parameters:
              progressToStdout: "true"
              failOnError: "false"
              failOnWarning: "false"

          jobs:
            - type: spider
              parameters:
                context: "Default Context"
                url: "$CYPRESS_BASE_URL"
                maxDuration: 3

            - type: passiveScan-wait
              parameters:
                maxDuration: 2

            - type: report
              parameters:
                template: traditional-html
                reportDir: /zap/wrk/security-and-test-reports/zap-passive
                reportFile: passive-report.html

            - type: report
              parameters:
                template: traditional-xml
                reportDir: /zap/wrk/security-and-test-reports/zap-passive
                reportFile: passive-report.xml
          EOF
          echo "=== Passive config ==="
          cat zap-passive.yaml

      - name: Passive scan – run
        if: env.ENABLE_PASSIVE_GithubActions == 'true'
        continue-on-error: true
        run: |
          mkdir -p security-and-test-reports/zap-passive
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap-passive.yaml

      - name: Passive scan – list reports
        if: env.ENABLE_PASSIVE_GithubActions == 'true' && always()
        run: |
          echo "Files in security-and-test-reports/zap-passive:"
          ls -la security-and-test-reports/zap-passive/ || echo "No files found"

      # ------------------------------------------------------------
      # 3. ACTIVE SCAN (only if enabled)
      # ------------------------------------------------------------
      - name: Active scan – generate config
        if: env.ENABLE_ACTIVE_GithubActions == 'true'
        run: |
          cat <<EOF > zap-active.yaml
          env:
            contexts:
              - name: "Default Context"
                urls:
                  - "$CYPRESS_BASE_URL"
            parameters:
              progressToStdout: "true"
              failOnError: "false"
              failOnWarning: "false"

          jobs:
            - type: spider
              parameters:
                context: "Default Context"
                url: "$CYPRESS_BASE_URL"
                maxDuration: 3

            - type: passiveScan-wait
              parameters:
                maxDuration: 2

            - type: activeScan
              parameters:
                context: "Default Context"
                maxScanDurationInMins: 5

            - type: report
              parameters:
                template: traditional-html
                reportDir: /zap/wrk/security-and-test-reports/zap-active
                reportFile: active-report.html

            - type: report
              parameters:
                template: traditional-xml
                reportDir: /zap/wrk/security-and-test-reports/zap-active
                reportFile: active-report.xml
          EOF
          echo "=== Active config ==="
          cat zap-active.yaml

      - name: Active scan – run
        if: env.ENABLE_ACTIVE_GithubActions == 'true'
        continue-on-error: true
        run: |
          mkdir -p security-and-test-reports/zap-active
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap-active.yaml

      - name: Active scan – list reports
        if: env.ENABLE_ACTIVE_GithubActions == 'true' && always()
        run: |
          echo "Files in security-and-test-reports/zap-active:"
          ls -la security-and-test-reports/zap-active/ || echo "No files found"

      # ------------------------------------------------------------
      # 4. Debug: Full directory tree
      # ------------------------------------------------------------
      - name: List all generated reports
        if: always()
        run: |
          echo "=== Full directory tree of security-and-test-reports ==="
          find security-and-test-reports -type f -ls || echo "No files found"

      # ------------------------------------------------------------
      # 5. Upload all reports as artifacts
      # ------------------------------------------------------------
      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-reports
          path: security-and-test-reports/
          if-no-files-found: warn