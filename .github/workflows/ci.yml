name: ZAP Security Scans with OrangeHRM

on:
  push:
    branches: [ main ]
  pull_request:

env:
  # Scan toggles (defaults: Spider=true, Passive=true, Active=true)
  ENABLE_SPIDER_GithubActions: ${{ vars.ENABLE_SPIDER_GithubActions || 'true' }}
  ENABLE_PASSIVE_GithubActions: ${{ vars.ENABLE_PASSIVE_GithubActions || 'true' }}
  ENABLE_ACTIVE_GithubActions: ${{ vars.ENABLE_ACTIVE_GithubActions || 'true' }}

  # Fix Node.js deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  zap-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. Find an available port (prefer 3000, then 8080, 8081, etc.)
      # ------------------------------------------------------------
      - name: Find available port
        id: find_port
        run: |
          for port in 3000 8080 8081 8082 8083 8084; do
            if ! ss -lpn | grep -q ":$port "; then
              echo "PORT=$port" >> $GITHUB_OUTPUT
              echo "Found free port: $port"
              break
            fi
          done
          if [ -z "${{ steps.find_port.outputs.PORT }}" ]; then
            echo "No free port found in range 3000,8080-8084, using 3000 as fallback"
            echo "PORT=3000" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------------------------
      # 2. Start OrangeHRM container with the chosen port
      # ------------------------------------------------------------
      - name: Start OrangeHRM container
        run: |
          docker run -d \
            --name orangehrm \
            -p ${{ steps.find_port.outputs.PORT }}:80 \
            orangehrm/orangehrm
          echo "OrangeHRM started on port ${{ steps.find_port.outputs.PORT }}"

      # ------------------------------------------------------------
      # 3. Wait for OrangeHRM to be ready (with robust curl error handling)
      # ------------------------------------------------------------
      - name: Wait for OrangeHRM to be ready
        run: |
          echo "Waiting for OrangeHRM to be ready..."
          APP_HOST="localhost"
          APP_PORT="${{ steps.find_port.outputs.PORT }}"
          PATHS=("/" "/web/index.php/auth/login")
          MAX_ATTEMPTS=60

          # Give container a moment to start listening
          sleep 5

          for i in $(seq 1 $MAX_ATTEMPTS); do
            for path in "${PATHS[@]}"; do
              URL="http://${APP_HOST}:${APP_PORT}${path}"
              # Capture HTTP status, fallback to "000" if curl fails
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
              if [[ "$STATUS" == "200" || "$STATUS" == "302" ]]; then
                echo "OrangeHRM is ready at $URL (HTTP $STATUS)!"
                exit 0
              fi
            done
            echo "Attempt $i/$MAX_ATTEMPTS - not ready yet, waiting 5 seconds..."
            if [ $((i % 10)) -eq 0 ]; then
              echo "Container logs at attempt $i:"
              docker logs orangehrm --tail 20
            fi
            sleep 5
          done

          echo "OrangeHRM did not become ready in time"
          echo "Final container logs:"
          docker logs orangehrm --tail 50
          exit 1

      # ------------------------------------------------------------
      # 4. Create report directories
      # ------------------------------------------------------------
      - name: Create report directories
        run: |
          mkdir -p security-and-test-reports/zap-spider
          mkdir -p security-and-test-reports/zap-passive
          mkdir -p security-and-test-reports/zap-active
          echo "Base directories created"

      # ------------------------------------------------------------
      # 5. Helper: Determine the URL that ZAP will use
      #    ZAP runs in a container and needs to reach the host where
      #    OrangeHRM is running. We use the host's IP on the default bridge.
      # ------------------------------------------------------------
      - name: Set ZAP target URL
        id: zap_url
        run: |
          HOST_IP=$(ip -4 addr show docker0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}' || echo "172.17.0.1")
          echo "ZAP_TARGET_URL=http://${HOST_IP}:${{ steps.find_port.outputs.PORT }}" >> $GITHUB_OUTPUT
          echo "ZAP will target: ${ZAP_TARGET_URL}"

      # ------------------------------------------------------------
      # 6. SPIDER SCAN (only if enabled)
      # ------------------------------------------------------------
      - name: Spider scan – generate config
        if: env.ENABLE_SPIDER_GithubActions == 'true'
        run: |
          cat <<EOF > zap-spider.yaml
          env:
            contexts:
              - name: "OrangeHRM Context"
                urls:
                  - "${{ steps.zap_url.outputs.ZAP_TARGET_URL }}"
            parameters:
              progressToStdout: "true"
              failOnError: "false"
              failOnWarning: "false"

          jobs:
            - type: spider
              parameters:
                context: "OrangeHRM Context"
                url: "${{ steps.zap_url.outputs.ZAP_TARGET_URL }}"
                maxDuration: 3

            - type: report
              parameters:
                template: traditional-html-plus
                reportDir: /zap/wrk/security-and-test-reports/zap-spider
                reportFile: spider-report.html
          EOF
          echo "=== Spider config ==="
          cat zap-spider.yaml

      - name: Spider scan – run
        if: env.ENABLE_SPIDER_GithubActions == 'true'
        continue-on-error: true
        run: |
          mkdir -p security-and-test-reports/zap-spider
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap-spider.yaml || true

      - name: Spider report – inject heading
        if: env.ENABLE_SPIDER_GithubActions == 'true' && always()
        run: |
          REPORT="security-and-test-reports/zap-spider/spider-report.html"
          if [ -f "$REPORT" ]; then
            echo "Injecting heading into spider report"
            sed -i 's/<body>/<body>\n<div style="background:#f0f0f0; padding:10px; text-align:center;"><h1 style="margin:0;">🕷️ Spider Scan Report<\/h1><\/div>/' "$REPORT"
          else
            echo "Spider report not found, skipping heading injection"
          fi

      - name: Spider scan – list reports
        if: env.ENABLE_SPIDER_GithubActions == 'true' && always()
        run: |
          echo "Files in security-and-test-reports/zap-spider:"
          ls -la security-and-test-reports/zap-spider/ || echo "No files found"

      # ------------------------------------------------------------
      # 7. PASSIVE SCAN (only if enabled)
      # ------------------------------------------------------------
      - name: Passive scan – generate config
        if: env.ENABLE_PASSIVE_GithubActions == 'true'
        run: |
          cat <<EOF > zap-passive.yaml
          env:
            contexts:
              - name: "OrangeHRM Context"
                urls:
                  - "${{ steps.zap_url.outputs.ZAP_TARGET_URL }}"
            parameters:
              progressToStdout: "true"
              failOnError: "false"
              failOnWarning: "false"

          jobs:
            - type: spider
              parameters:
                context: "OrangeHRM Context"
                url: "${{ steps.zap_url.outputs.ZAP_TARGET_URL }}"
                maxDuration: 3

            - type: passiveScan-wait
              parameters:
                maxDuration: 2

            - type: report
              parameters:
                template: traditional-html
                reportDir: /zap/wrk/security-and-test-reports/zap-passive
                reportFile: passive-report.html
          EOF
          echo "=== Passive config ==="
          cat zap-passive.yaml

      - name: Passive scan – run
        if: env.ENABLE_PASSIVE_GithubActions == 'true'
        continue-on-error: true
        run: |
          mkdir -p security-and-test-reports/zap-passive
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap-passive.yaml || true

      - name: Passive report – inject heading
        if: env.ENABLE_PASSIVE_GithubActions == 'true' && always()
        run: |
          REPORT="security-and-test-reports/zap-passive/passive-report.html"
          if [ -f "$REPORT" ]; then
            echo "Injecting heading into passive report"
            sed -i 's/<body>/<body>\n<div style="background:#fff3e0; padding:10px; text-align:center;"><h1 style="margin:0;">🟡 Passive Scan Report<\/h1><\/div>/' "$REPORT"
          else
            echo "Passive report not found, skipping heading injection"
          fi

      - name: Passive scan – list reports
        if: env.ENABLE_PASSIVE_GithubActions == 'true' && always()
        run: |
          echo "Files in security-and-test-reports/zap-passive:"
          ls -la security-and-test-reports/zap-passive/ || echo "No files found"

      # ------------------------------------------------------------
      # 8. ACTIVE SCAN (only if enabled)
      # ------------------------------------------------------------
      - name: Active scan – generate config
        if: env.ENABLE_ACTIVE_GithubActions == 'true'
        run: |
          cat <<EOF > zap-active.yaml
          env:
            contexts:
              - name: "OrangeHRM Context"
                urls:
                  - "${{ steps.zap_url.outputs.ZAP_TARGET_URL }}"
            parameters:
              progressToStdout: "true"
              failOnError: "false"
              failOnWarning: "false"

          jobs:
            - type: spider
              parameters:
                context: "OrangeHRM Context"
                url: "${{ steps.zap_url.outputs.ZAP_TARGET_URL }}"
                maxDuration: 3

            - type: passiveScan-wait
              parameters:
                maxDuration: 2

            - type: activeScan
              parameters:
                context: "OrangeHRM Context"
                maxScanDurationInMins: 5

            - type: report
              parameters:
                template: traditional-html
                reportDir: /zap/wrk/security-and-test-reports/zap-active
                reportFile: active-report.html
          EOF
          echo "=== Active config ==="
          cat zap-active.yaml

      - name: Active scan – run
        if: env.ENABLE_ACTIVE_GithubActions == 'true'
        continue-on-error: true
        run: |
          mkdir -p security-and-test-reports/zap-active
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap-active.yaml || true

      - name: Active report – inject heading
        if: env.ENABLE_ACTIVE_GithubActions == 'true' && always()
        run: |
          REPORT="security-and-test-reports/zap-active/active-report.html"
          if [ -f "$REPORT" ]; then
            echo "Injecting heading into active report"
            sed -i 's/<body>/<body>\n<div style="background:#ffe0e0; padding:10px; text-align:center;"><h1 style="margin:0;">🔴 Active Scan Report<\/h1><\/div>/' "$REPORT"
          else
            echo "Active report not found, skipping heading injection"
          fi

      - name: Active scan – list reports
        if: env.ENABLE_ACTIVE_GithubActions == 'true' && always()
        run: |
          echo "Files in security-and-test-reports/zap-active:"
          ls -la security-and-test-reports/zap-active/ || echo "No files found"

      # ------------------------------------------------------------
      # 9. Debug: Full directory tree
      # ------------------------------------------------------------
      - name: List all generated reports
        if: always()
        run: |
          echo "=== Full directory tree of security-and-test-reports ==="
          find security-and-test-reports -type f -ls || echo "No files found"

      # ------------------------------------------------------------
      # 10. Upload all reports as artifacts
      # ------------------------------------------------------------
      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-reports
          path: security-and-test-reports/
          if-no-files-found: warn

      # ------------------------------------------------------------
      # 11. Clean up – remove container after workflow
      # ------------------------------------------------------------
      - name: Stop and remove OrangeHRM container
        if: always()
        run: |
          docker stop orangehrm || true
          docker rm orangehrm || true